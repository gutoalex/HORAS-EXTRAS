<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Horas Extras</title>
  <!-- Tailwind CSS para um design lindo, moderno e responsivo -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Fonte Segoe UI/Inter para elegância corporativa -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    /* Custom scrollbar para ficar bem sutil */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased">

  <div class="max-w-5xl mx-auto p-4 md:p-8 space-y-6">
    
    <!-- Cabeçalho Principal -->
    <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pb-4 border-b border-slate-200">
      <div class="flex items-center gap-3">
        <div class="bg-emerald-600 p-2.5 rounded-xl text-white shadow-sm shadow-emerald-200">
          <!-- Ícone SVG de Planilha -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Registro de Horas Extras</h1>
          <p class="text-sm text-slate-500">Sincronizado automaticamente com sua Planilha Google</p>
        </div>
      </div>
      <button 
        onclick="fetchEntries()" 
        id="btn-sync"
        class="text-sm font-semibold bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-xl flex items-center gap-2 shadow-sm transition-all active:scale-[0.98]"
      >
        <span id="sync-icon" class="inline-block">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.228 9H18.01" />
          </svg>
        </span>
        <span id="sync-text">Sincronizar Dados</span>
      </button>
    </header>

    <!-- Alerta de Feedback/Erro -->
    <div id="error-alert" class="hidden bg-rose-50 border-l-4 border-rose-500 p-4 rounded-r-xl flex items-start gap-3 shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="text-rose-500 flex-shrink-0 w-5 h-5 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <div id="error-message" class="text-rose-800 text-sm font-medium flex-1"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      
      <!-- Coluna Esquerda: Formulário de Registro -->
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-fit">
        <h2 class="font-bold text-lg text-slate-900 mb-4 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Novo Registro
        </h2>
        
        <form id="overtime-form" onsubmit="handleSubmit(event)" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Data</label>
            <input 
              type="date" 
              id="input-date" 
              required
              class="w-full border-slate-200 border p-2.5 rounded-xl font-medium focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition-all" 
            />
          </div>
          
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Início</label>
              <input 
                type="time" 
                id="input-start" 
                required
                class="w-full border-slate-200 border p-2.5 rounded-xl font-medium focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition-all" 
              />
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Fim</label>
              <input 
                type="time" 
                id="input-end" 
                required
                class="w-full border-slate-200 border p-2.5 rounded-xl font-medium focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition-all" 
              />
            </div>
          </div>
          
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Motivo das Horas Extras</label>
            <textarea 
              id="input-reason" 
              placeholder="Ex: Deploy de produção, Correção de Bug..." 
              required
              rows="3" 
              class="w-full border-slate-200 border p-2.5 rounded-xl font-medium focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition-all resize-none placeholder-slate-400"
            ></textarea>
          </div>
          
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Link ou Chave do Jira (Opcional)</label>
            <input 
              type="text" 
              id="input-jira" 
              placeholder="Ex: PROJ-1234" 
              class="w-full border-slate-200 border p-2.5 rounded-xl font-medium focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition-all placeholder-slate-400" 
            />
          </div>
          
          <button 
            type="submit" 
            id="btn-submit"
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl active:scale-[0.99] transition-all flex justify-center items-center gap-2 mt-2 shadow-sm shadow-emerald-100 disabled:opacity-50"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            <span>Adicionar Registro</span>
          </button>
        </form>
      </div>
      
      <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col min-h-[450px]">
        
        <!-- Painel de Filtros e Resumos -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
          <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 w-full sm:w-auto">
            <div>
              <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Filtrar por Mês</label>
              <input 
                type="month" 
                id="filter-month" 
                onchange="handleMonthChange()"
                class="border border-slate-200 p-2 rounded-xl font-semibold text-slate-700 focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition-all bg-slate-50" 
              />
            </div>
            <div class="h-10 w-px bg-slate-200 hidden sm:block"></div>
            <div>
              <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Total acumulado</p>
              <p id="total-duration" class="text-3xl font-extrabold text-emerald-600 leading-none tracking-tight">0m</p>
            </div>
          </div>

          <!-- Botões de Ações de Exportação -->
          <div class="flex gap-2 w-full sm:w-auto">
            <button 
              onclick="exportToExcel()" 
              id="btn-export"
              class="flex-1 sm:flex-none flex items-center justify-center gap-2 text-sm bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-semibold hover:bg-emerald-700 active:scale-[0.98] transition-all disabled:opacity-40 disabled:pointer-events-none shadow-sm"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
              </svg>
              Exportar
            </button>
            <button 
              onclick="copyReport()" 
              id="btn-copy"
              class="flex-1 sm:flex-none flex items-center justify-center gap-2 text-sm bg-white border border-slate-200 text-slate-700 px-4 py-2.5 rounded-xl font-semibold hover:bg-slate-50 active:scale-[0.98] transition-all disabled:opacity-40 shadow-sm"
            >
              <span id="copy-icon">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
              </span>
              <span id="copy-text">Copiar Texto</span>
            </button>
          </div>
        </div>

        <!-- Área de Histórico das Horas -->
        <div class="flex-1 overflow-hidden flex flex-col">
          <div class="flex items-center gap-2 pb-3 mb-3 border-b border-slate-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            <h3 class="font-bold text-slate-600 text-sm tracking-tight">Histórico de Registros</h3>
          </div>
          
          <div id="list-container" class="space-y-3 overflow-y-auto pr-2 pb-2 flex-1 max-h-[400px]">
            <!-- Injetado via Javascript dinamicamente -->
          </div>
        </div>
        
      </div>
    </div>
  </div>

  <script>
    // URL da sua planilha do Google Sheets conectada
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8fV9oOc6DWF6D3N6ANk2hVbJvr84hBLTbzkcp_4FqBLSx7A8Q0MlX2P1GVVDIIipYtA/exec";
    
    // Lista global em memória
    let entries = [];
    
    // Configura os valores de input padrão ao iniciar
    document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('filter-month').value = new Date().toISOString().slice(0, 7);

    // Primeira carga ao abrir a página
    window.onload = function() {
      fetchEntries();
    };

    async function fetchEntries() {
      showLoadingList(true);
      showError('');
      
      try {
        // AllOrigins encapsula a resposta eliminando CORS do Google Sheets no Github Pages
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(SCRIPT_URL + "?t=" + Date.now())}`);
        if (!response.ok) throw new Error("Erro de conexão com o servidor de sincronização.");
        
        const data = await response.json();
        const entriesData = JSON.parse(data.contents);
        
        if (Array.isArray(entriesData)) {
          entries = entriesData.sort((a, b) => new Date(b.date) - new Date(a.date));
        }
        renderEntries();
      } catch (err) {
        console.error(err);
        showError("Não foi possível ler dados da sua Planilha Google. Certifique-se de que publicou o script do Apps Script como 'Qualquer pessoa'.");
        showLoadingList(false);
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      showSubmitLoading(true);
      showError('');

      const date = document.getElementById('input-date').value;
      const startTime = document.getElementById('input-start').value;
      const endTime = document.getElementById('input-end').value;
      const reason = document.getElementById('input-reason').value;
      const jira = document.getElementById('input-jira').value;

      const durationMinutes = calculateDuration(startTime, endTime);

      const newEntry = {
        id: crypto.randomUUID(),
        date,
        startTime,
        endTime,
        reason,
        jira,
        durationMinutes
      };

      try {
        // Envia cego (no-cors) para evitar travas preflight de CORS de navegadores modernos
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'add', data: newEntry })
        });

        // Atualização rápida na tela de forma otimista
        entries.unshift(newEntry);
        entries.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        // Limpa formulário mantendo apenas data
        document.getElementById('input-start').value = '';
        document.getElementById('input-end').value = '';
        document.getElementById('input-reason').value = '';
        document.getElementById('input-jira').value = '';

        renderEntries();
      } catch (err) {
        console.error(err);
        showError("Erro de comunicação ao salvar o registro no Google Sheets.");
      } finally {
        showSubmitLoading(false);
      }
    }

    async function removeEntry(id) {
      if (!confirm("Tem certeza que deseja apagar permanentemente esse registro da planilha?")) return;
      
      const previousEntries = [...entries];
      // Remoção otimista da tela
      entries = entries.filter(e => e.id !== id);
      renderEntries();

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'delete', id: id })
        });
      } catch (err) {
        console.error(err);
        entries = previousEntries;
        renderEntries();
        showError("Falha ao tentar remover o registro fisicamente da Planilha.");
      }
    }

    function calculateDuration(start, end) {
      const [startHour, startMin] = start.split(':').map(Number);
      const [endHour, endMin] = end.split(':').map(Number);
      let totalStartMinutes = startHour * 60 + startMin;
      let totalEndMinutes = endHour * 60 + endMin;
      
      if (totalEndMinutes < totalStartMinutes) {
        totalEndMinutes += 24 * 60; // Passagem de Meia-Noite
      }
      return totalEndMinutes - totalStartMinutes;
    }

    function formatDuration(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return hours > 0 ? `${hours}h ${minutes > 0 ? minutes + 'm' : ''}` : `${minutes}m`;
    }

    function handleMonthChange() {
      renderEntries();
    }

    function renderEntries() {
      const listContainer = document.getElementById('list-container');
      const selectedMonth = document.getElementById('filter-month').value;
      
      // Filtra e ordena
      const filtered = entries.filter(entry => entry.date.startsWith(selectedMonth));
      
      // Atualiza o acumulado de horas do mês
      const totalMinutes = filtered.reduce((acc, curr) => acc + Number(curr.durationMinutes), 0);
      document.getElementById('total-duration').innerText = formatDuration(totalMinutes);

      // Desabilita botões se a lista estiver vazia
      document.getElementById('btn-export').disabled = filtered.length === 0;
      document.getElementById('btn-copy').disabled = filtered.length === 0;

      if (filtered.length === 0) {
        listContainer.innerHTML = `
          <div class="flex flex-col items-center justify-center py-10 text-slate-400 space-y-3">
             <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
               <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
             </svg>
             <p class="text-sm font-medium">Nenhum registro de hora extra para o mês filtrado.</p>
          </div>
        `;
        return;
      }

      let html = '';
      filtered.forEach(entry => {
        const dateParts = entry.date.split('-');
        const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
        
        const jiraSection = entry.jira ? `
          <div class="inline-flex items-center gap-1 text-xs text-indigo-600 bg-indigo-50 px-2.5 py-0.5 rounded-lg font-bold mt-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2v-5M16.5 7.5L12 12m0 0l-1.5-1.5M12 12l1.5 1.5M12 12V6" />
            </svg>
            ${entry.jira.startsWith('http') ? `<a href="${entry.jira}" target="_blank" class="hover:underline">Ver Ticket</a>` : `<span>${entry.jira}</span>`}
          </div>
        ` : '';

        html += `
          <div class="group flex justify-between items-start border border-slate-100 p-4 rounded-xl hover:border-emerald-200 hover:shadow-sm hover:shadow-emerald-50/50 transition-all bg-white">
            <div class="space-y-1.5 flex-1 pr-4">
              <div class="flex flex-wrap items-center gap-2">
                <span class="inline-flex items-center gap-1.5 bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-lg text-xs font-bold">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  ${entry.startTime} - ${entry.endTime}
                </span>
                <span class="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-lg">${formattedDate}</span>
                <span class="text-xs font-extrabold text-slate-400">(${formatDuration(entry.durationMinutes)})</span>
              </div>
              <p class="text-sm font-semibold text-slate-700 leading-relaxed">${entry.reason}</p>
              ${jiraSection}
            </div>
            <button 
              onclick="removeEntry('${entry.id}')" 
              class="text-slate-300 hover:text-rose-500 p-1.5 rounded-lg hover:bg-rose-50 transition-colors opacity-100 md:opacity-0 group-hover:opacity-100 focus:opacity-100"
              title="Remover Registro"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        `;
      });
      listContainer.innerHTML = html;
    }

    function copyReport() {
      const selectedMonth = document.getElementById('filter-month').value;
      const filtered = entries.filter(entry => entry.date.startsWith(selectedMonth));
      if (filtered.length === 0) return;

      const totalMinutes = filtered.reduce((acc, curr) => acc + Number(curr.durationMinutes), 0);
      let report = `📊 Relatório de Horas Extras - ${selectedMonth}\n`;
      report += `Total do Mês: ${formatDuration(totalMinutes)}\n\n`;
      
      filtered.forEach(entry => {
        const dateParts = entry.date.split('-');
        const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;
        
        report += `📅 Data: ${formattedDate} | 🕒 ${entry.startTime} às ${entry.endTime} (${formatDuration(entry.durationMinutes)})\n`;
        report += `📝 Motivo: ${entry.reason}\n`;
        if (entry.jira) {
          report += `🔗 Jira: ${entry.jira}\n`;
        }
        report += `-----------------------------------\n`;
      });

      const tempTextArea = document.createElement("textarea");
      tempTextArea.value = report;
      tempTextArea.style.position = "fixed";
      tempTextArea.style.opacity = "0";
      document.body.appendChild(tempTextArea);
      tempTextArea.select();
      
      try {
        const successful = document.execCommand('copy');
        document.body.removeChild(tempTextArea);
        
        if (successful) {
          const btnText = document.getElementById('copy-text');
          const btnIcon = document.getElementById('copy-icon');
          
          btnText.innerText = "Copiado!";
          btnIcon.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          `;
          
          setTimeout(() => {
            btnText.innerText = "Copiar Texto";
            btnIcon.innerHTML = `
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
              </svg>
            `;
          }, 2000);
        }
      } catch (err) {
        console.error("Erro ao copiar", err);
      }
    }

    function exportToExcel() {
      const selectedMonth = document.getElementById('filter-month').value;
      const filtered = entries.filter(entry => entry.date.startsWith(selectedMonth));
      if (filtered.length === 0) return;

      let tableHtml = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
        <head>
          <meta charset="utf-8">
          <style>
            table { border-collapse: collapse; width: 100%; font-family: Segoe UI, Arial, sans-serif; }
            th { background-color: #059669; color: white; font-weight: bold; padding: 10px; border: 1px solid #e2e8f0; text-align: left; }
            td { padding: 8px; border: 1px solid #e2e8f0; vertical-align: top; }
            .text-center { text-align: center; }
            .title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #1e293b; }
          </style>
        </head>
        <body>
          <div class="title">Relatório de Horas Extras - ${selectedMonth}</div>
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Início</th>
                <th>Fim</th>
                <th>Duração</th>
                <th>Motivo</th>
                <th>Link / Ticket Jira</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.map(e => {
                const dp = e.date.split('-');
                const fDate = `${dp[2]}/${dp[1]}/${dp[0]}`;
                return `
                  <tr>
                    <td class="text-center">${fDate}</td>
                    <td class="text-center">${e.startTime}</td>
                    <td class="text-center">${e.endTime}</td>
                    <td class="text-center">${formatDuration(e.durationMinutes)}</td>
                    <td>${e.reason}</td>
                    <td>${e.jira || '-'}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </body>
        </html>
      `;

      const blob = new Blob([tableHtml], { type: 'application/vnd.ms-excel' });
      const downloadLink = document.createElement('a');
      downloadLink.href = URL.createObjectURL(blob);
      downloadLink.download = `Relatorio_Horas_${selectedMonth}.xls`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    }

    function showLoadingList(show) {
      const container = document.getElementById('list-container');
      if (show) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center h-48 text-slate-400 space-y-3">
             <span class="animate-spin text-emerald-500">
               <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.228 9H18.01" />
               </svg>
             </span>
             <p class="font-medium text-sm">Sincronizando com a planilha...</p>
          </div>
        `;
      }
    }

    function showSubmitLoading(loading) {
      const btn = document.getElementById('btn-submit');
      btn.disabled = loading;
      if (loading) {
        btn.innerHTML = `
          <span class="animate-spin">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.228 9H18.01" />
            </svg>
          </span>
          <span>Salvando Registro...</span>
        `;
      } else {
        btn.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          <span>Adicionar Registro</span>
        `;
      }
    }

    function showError(msg) {
      const alert = document.getElementById('error-alert');
      const text = document.getElementById('error-message');
      if (msg) {
        text.innerText = msg;
        alert.classList.remove('hidden');
      } else {
        alert.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
